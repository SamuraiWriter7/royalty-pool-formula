name: Validate Specs

on:
  push:
    paths:
      - "schema/**"
      - "examples/**"
      - ".github/workflows/validate-specs.yml"
  pull_request:
    paths:
      - "schema/**"
      - "examples/**"
      - ".github/workflows/validate-specs.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema PyYAML

      - name: Debug file tree
        run: |
          pwd
          find . -maxdepth 4 -type f | sort

      - name: Validate royalty-pool-formula-v0.1.sample.yaml
        run: |
          python - <<'PY'
          import json
          import yaml
          from jsonschema import Draft202012Validator

          schema_path = "schema/royalty-pool-formula-v0.1.schema.json"
          sample_path = "examples/royalty-pool-formula-v0.1.sample.yaml"

          with open(schema_path, "r", encoding="utf-8") as f:
              schema = json.load(f)

          with open(sample_path, "r", encoding="utf-8") as f:
              sample = yaml.safe_load(f)

          validator = Draft202012Validator(schema)
          errors = sorted(validator.iter_errors(sample), key=lambda e: list(e.path))

          if errors:
              for err in errors:
                  path = ".".join(str(x) for x in err.path)
                  print(f"[ERROR] path={path or '<root>'}")
                  print(err.message)
                  print("-" * 80)
              raise SystemExit(1)

          print("Validation passed: royalty-pool-formula-v0.1.sample.yaml")
          PY
